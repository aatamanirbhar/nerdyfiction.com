<script type="module" src="/_astro/page.BNYwb576.js"></script></head> <body class="min-h-full bg-ink-950 text-ink-100 font-serif antialiased selection:bg-ember-500/40 selection:text-ink-50">  <main class="">  <div class="reader-shell fixed inset-0 bg-ink-950 text-ink-50 overflow-hidden" data-reader data-chapter-id="ordinary-gods-1" data-book-slug="ordinary-gods" data-scenes="[{&#34;id&#34;:&#34;prologue-01&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;The universe does not announce itself.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;,&#34;audioCue&#34;:&#34;low drone&#34;},{&#34;id&#34;:&#34;prologue-02&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;For all its scale — the unfathomable distances, the slow burn of stars older than language, the quiet machinery of galaxies spinning in the dark — the universe tends toward silence. It does not knock. It does not warn.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;prologue-03&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;When something changes at the level where reality itself is written, it does not arrive with thunder.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;prologue-04&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;It arrives the way a single drop of ink finds a glass of water. Unseen, for one half of one second. And then, everywhere.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;prologue-break-01&#34;,&#34;type&#34;:&#34;transition&#34;,&#34;text&#34;:&#34;· · ·&#34;,&#34;backdrop&#34;:&#34;void&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;prologue-05&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;On the last night of 2026, at precisely 10:00 PM Eastern Standard Time, something changed.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;,&#34;audioCue&#34;:&#34;single struck bell&#34;},{&#34;id&#34;:&#34;prologue-06&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;It happened everywhere at once and nowhere in particular. No satellite recorded it. No instrument on Earth, however sensitive, so much as twitched.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;prologue-07&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;If you had asked any of the eight billion people on the planet that night whether anything unusual had occurred, every single one of them — every last one except twelve — would have said no.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;prologue-08&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;Those twelve would have hesitated.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;prologue-09&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;Just for a second.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;prologue-10&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;And then they would have said no, too.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;prologue-break-02&#34;,&#34;type&#34;:&#34;transition&#34;,&#34;text&#34;:&#34;· · ·&#34;,&#34;backdrop&#34;:&#34;void&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;prologue-11&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;This is the story of four of them.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;prologue-12&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;It begins, as most disappointing things do, in a waiting room.&#34;,&#34;backdrop&#34;:&#34;cosmos&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;prologue-break-03&#34;,&#34;type&#34;:&#34;transition&#34;,&#34;text&#34;:&#34;· · ·&#34;,&#34;backdrop&#34;:&#34;void&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-01&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;The waiting room of Marcus Heinz’s Studio City office had the kind of furniture that was expensive specifically so that you would notice it was expensive.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;iris&#34;,&#34;audioCue&#34;:&#34;central air, distant traffic&#34;,&#34;marker&#34;:&#34;I.&#34;},{&#34;id&#34;:&#34;robert-02&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;A leather couch the color of dried blood. A glass coffee table with absolutely nothing on it except a single, oversized art book about the films of a director Robert Calloway had never heard of, positioned at what felt like a deliberate forty-five-degree angle.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-03&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;On the wall, in a frame that had probably cost more than Robert’s rent, hung a poster for a movie that had grossed four hundred million dollars worldwide.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-04&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;Robert had researched it once, out of curiosity and self-loathing in roughly equal measure. The lead actor in that poster had been twenty-six when it was shot.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-05&#34;,&#34;type&#34;:&#34;thought&#34;,&#34;text&#34;:&#34;Robert was twenty-six now.&#34;,&#34;speaker&#34;:&#34;Robert&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;robert-06&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He sat very straight on the blood-leather couch, both feet flat on the floor, hands folded in his lap like he was at a job interview — which, in the only way that mattered to him, he was.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-07&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He had been the first to arrive. He was always the first to arrive. Fifteen minutes early to every audition, every meeting, every callback, as if punctuality were a substitute for everything else he didn’t have.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-08&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;A reel that nobody watched past the ten-second mark. A reputation. A name that meant something to somebody.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-09&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He’d been sitting in this exact spot for twenty-five minutes. The meeting had been for seven.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;robert-10&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;This was a callback — technically. He had auditioned for a supporting role in an indie feature eight days ago, a small but meaty part, the kind of role that could actually do something for a career if the right person saw it.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-11&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He had worked on it for a week. He’d recorded himself doing the scene eleven times and watched all eleven back with the sound of his own voice making his skin crawl, the way it always did, and he’d kept going anyway because the twelfth time felt closer to right.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-12&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He had not heard the word “callback” used anywhere in the three voicemails and two emails that had led him here tonight. What he had heard, in increasingly vague language, was that Marcus wanted to “touch base” and “loop him in on some thoughts” before the holidays.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-13&#34;,&#34;type&#34;:&#34;thought&#34;,&#34;text&#34;:&#34;Robert had told himself this was a good sign. People didn’t fly you in — well, he’d driven, but the principle held — to deliver bad news in person.&#34;,&#34;speaker&#34;:&#34;Robert&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-14&#34;,&#34;type&#34;:&#34;thought&#34;,&#34;text&#34;:&#34;Bad news was an email. Bad news was nothing at all, just silence stretching out until you stopped checking your phone every four minutes. In person meant they liked something. In person meant there was a conversation to be had.&#34;,&#34;speaker&#34;:&#34;Robert&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-15&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He checked his phone. 7:26 PM. New Year’s Eve. Outside the tinted office windows, Los Angeles was already gearing up for the kind of night where everyone pretended the changing of a number meant something had actually changed.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;robert-16&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;The assistant — a young woman who’d introduced herself as Priya and then immediately stopped making eye contact with him, which Robert had learned over the years to read as a bad sign — had told him Marcus was running behind.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-17&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;That had been twenty minutes ago. Robert had nodded, said of course, no problem, take your time, and then sat back down to wait in a silence so complete he could hear the office’s central air system click on and off.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-18&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He stood up. Sitting still for this long made his skin itch, made his thoughts loop back on themselves in ways he didn’t like. He walked to the window.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;rising&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-19&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;Traffic on Ventura was already thickening, a river of red and white lights crawling toward wherever people went to feel like the year ending mattered.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;idle&#34;,&#34;position&#34;:&#34;right&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-20&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He walked back. He sat down again. He picked up the art book, mostly for something to do with his hands, and let it fall open to a random page —&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;robert-21&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;— a black-and-white photograph of a director on set, surrounded by people who were listening to him, actually listening, the way Robert imagined people might listen to him someday, if—&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;moment-slip&#34;,&#34;type&#34;:&#34;moment&#34;,&#34;text&#34;:&#34;The book slipped.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;reaching&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:1}],&#34;fx&#34;:&#34;time-pinch&#34;,&#34;transition&#34;:&#34;slow-fade&#34;,&#34;audioCue&#34;:&#34;the room narrows&#34;},{&#34;id&#34;:&#34;moment-slip-02&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;It wasn’t dramatic. It wasn’t even really a slip — more like his hand simply forgot, for a fraction of a second, that it was holding something.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;reaching&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:1}],&#34;fx&#34;:&#34;time-pinch&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;moment-slip-03&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;The book tipped off his palm and began to fall toward the glass table, toward that single empty spot where it had been so carefully, deliberately placed, and Robert’s whole body flinched in anticipation of the crash, the cracked glass, the look on Priya’s face, the end of whatever tiny chance he had at this meeting going well—&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;reeling&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:1}],&#34;fx&#34;:&#34;time-pinch&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;red-streak&#34;,&#34;type&#34;:&#34;moment&#34;,&#34;text&#34;:&#34;A streak of red light, jagged, impossibly fast — gone before he could even call it a memory.&#34;,&#34;backdrop&#34;:&#34;flash-red&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;red-streak&#34;,&#34;transition&#34;:&#34;flash&#34;,&#34;audioCue&#34;:&#34;a sound that isn’t a sound&#34;},{&#34;id&#34;:&#34;moment-stop&#34;,&#34;type&#34;:&#34;moment&#34;,&#34;text&#34;:&#34;The book stopped.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;reeling&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:1}],&#34;fx&#34;:&#34;book-float&#34;,&#34;transition&#34;:&#34;iris&#34;,&#34;audioCue&#34;:&#34;silence, perfect&#34;},{&#34;id&#34;:&#34;moment-stop-02&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;Six inches above the table. Just — stopped. Hanging in the air at the exact angle it had been falling, as if time itself had reached out and pinched it between two fingers.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;reeling&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:1}],&#34;fx&#34;:&#34;book-float&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;moment-stop-03&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;Robert stared at it.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:1}],&#34;fx&#34;:&#34;book-float&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;moment-stop-04&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He became aware, in the back of his mind, of something else — something that had happened a half-second before the book left his hand, something he’d been too startled to register until now. A flash. Not in the room. Not in his eyes, exactly. Somewhere behind them, or through them.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:1}],&#34;fx&#34;:&#34;tilt-world&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;moment-stop-05&#34;,&#34;type&#34;:&#34;thought&#34;,&#34;text&#34;:&#34;Something in him had — shifted. Like a key turning in a lock he hadn’t known was there.&#34;,&#34;speaker&#34;:&#34;Robert&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:1}],&#34;fx&#34;:&#34;tilt-world&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;moment-stop-06&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;The book hung in the air.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;reaching&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:1}],&#34;fx&#34;:&#34;book-float&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;moment-stop-07&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;Robert reached out, very slowly, and closed his hand around it. The moment his fingers touched the cover, it dropped the remaining six inches into his palm with completely ordinary weight, as if it had never stopped at all.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;reaching&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:1}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;moment-stop-08&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He placed it back on the table. Exactly where it had been. At the forty-five-degree angle.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;moment-stop-09&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;His hand was shaking.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;aftermath-01&#34;,&#34;type&#34;:&#34;thought&#34;,&#34;text&#34;:&#34;Okay. Okay, that. That happened. That was a thing that happened.&#34;,&#34;speaker&#34;:&#34;Robert&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;aftermath-02&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He sat back down on the couch. His heart was going hard enough that he could feel it in his throat, in his fingertips, a high thin buzzing under his skin like he’d had too much coffee, except he hadn’t had any coffee, he’d been too nervous to drink anything before the meeting in case he needed to—&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;aftermath-03&#34;,&#34;type&#34;:&#34;thought&#34;,&#34;text&#34;:&#34;Focus.&#34;,&#34;speaker&#34;:&#34;Robert&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;aftermath-04&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He looked at the table. The book sat there, inert, exactly as before. He looked at his hand. Just a hand. Slightly damp now, but just a hand.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;aftermath-05&#34;,&#34;type&#34;:&#34;thought&#34;,&#34;text&#34;:&#34;Did that happen?&#34;,&#34;speaker&#34;:&#34;Robert&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;aftermath-06&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He thought about asking Priya if she’d seen it. He immediately understood, with the kind of clarity that arrives uninvited, exactly how that conversation would go, and exactly how it would end his career before it had even properly started.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;aftermath-07&#34;,&#34;type&#34;:&#34;thought&#34;,&#34;text&#34;:&#34;Hi, sorry, quick question — did you happen to see that book just float for a second? No? Totally my imagination? Great, cool, awesome, anyway about that role—&#34;,&#34;speaker&#34;:&#34;Robert&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;marcus-enters-01&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;The door to the inner office opened. Marcus Heinz emerged, already mid-sentence into his phone, raising one finger toward Robert in the universal gesture for one more minute that Robert had learned, over six years in this city, almost always meant ten to fifteen.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;left&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;iris&#34;,&#34;audioCue&#34;:&#34;door, distant phone voice&#34;},{&#34;id&#34;:&#34;marcus-enters-02&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;Robert smiled and nodded and sat very still, and underneath the smile his mind kept circling back to the book, hanging in the air, six inches above the glass, for no reason that the world as he understood it could explain.&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;left&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;marcus-enters-03&#34;,&#34;type&#34;:&#34;thought&#34;,&#34;text&#34;:&#34;It was nerves. A trick of the eye. The kind of thing your brain does when you’ve been awake too long and wanting something too badly.&#34;,&#34;speaker&#34;:&#34;Robert&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;tense&#34;,&#34;position&#34;:&#34;left&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;marcus-enters-04&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He believed this for almost six full minutes — right up until the meeting started, and Marcus Heinz told him, with the practiced gentleness of a man who did this several times a week,&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;left&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;marcus-dialog-01&#34;,&#34;type&#34;:&#34;dialog&#34;,&#34;text&#34;:&#34;We’ve decided to go in a different direction for the role. But you were really in the room with your audition — we’ll absolutely keep you in mind for future projects. Have a wonderful New Year.&#34;,&#34;speaker&#34;:&#34;Marcus Heinz&#34;,&#34;backdrop&#34;:&#34;studio-city&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;left&#34;,&#34;intensity&#34;:0.85}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;,&#34;audioCue&#34;:&#34;office hush&#34;},{&#34;id&#34;:&#34;exit-01&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;Robert thanked him. Shook his hand. Walked out past Priya, who still didn’t make eye contact, and out into the parking structure, where he sat in his car for a long time before starting the engine.&#34;,&#34;backdrop&#34;:&#34;sunset-window&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.95}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;,&#34;audioCue&#34;:&#34;distant freeway&#34;},{&#34;id&#34;:&#34;exit-02&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He didn’t think about the book again that night.&#34;,&#34;backdrop&#34;:&#34;sunset-window&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;},{&#34;id&#34;:&#34;exit-03&#34;,&#34;type&#34;:&#34;narration&#34;,&#34;text&#34;:&#34;He would think about it again very soon.&#34;,&#34;backdrop&#34;:&#34;sunset-window&#34;,&#34;characters&#34;:[{&#34;id&#34;:&#34;robert&#34;,&#34;pose&#34;:&#34;seated&#34;,&#34;position&#34;:&#34;center&#34;,&#34;intensity&#34;:0.9}],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;slow-fade&#34;},{&#34;id&#34;:&#34;outro-break&#34;,&#34;type&#34;:&#34;transition&#34;,&#34;text&#34;:&#34;· · ·&#34;,&#34;backdrop&#34;:&#34;void&#34;,&#34;characters&#34;:[],&#34;fx&#34;:&#34;none&#34;,&#34;transition&#34;:&#34;fade&#34;}]" data-characters="[{&#34;id&#34;:&#34;robert&#34;,&#34;name&#34;:&#34;Robert Calloway&#34;,&#34;silhouetteColor&#34;:&#34;#b09f7d&#34;},{&#34;id&#34;:&#34;alex&#34;,&#34;name&#34;:&#34;Alex Whitfield&#34;,&#34;silhouetteColor&#34;:&#34;#5b9bd5&#34;},{&#34;id&#34;:&#34;third&#34;,&#34;name&#34;:&#34;—&#34;,&#34;silhouetteColor&#34;:&#34;#7a5b9b&#34;},{&#34;id&#34;:&#34;fourth&#34;,&#34;name&#34;:&#34;—&#34;,&#34;silhouetteColor&#34;:&#34;#9bb05b&#34;}]" data-astro-cid-dtqsyebs> <!-- Top bar --> <div class="absolute top-0 inset-x-0 z-30 flex items-center justify-between px-6 py-3 pointer-events-none" data-astro-cid-dtqsyebs> <a href="/books/ordinary-gods" class="pointer-events-auto inline-flex items-center gap-2 text-ink-200 hover:text-ink-50 font-mono uppercase tracking-widest text-[10px] backdrop-blur-md bg-ink-950/40 px-3 py-1.5 rounded-sm border border-ink-700/40 transition-colors" data-astro-prefetch data-astro-cid-dtqsyebs>
